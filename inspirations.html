<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mike's art portfolio | Inspirations</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <nav>
      <span class="nav__logo">Mike's art portfolio</span>
      <div class="nav__links">
        <a href="index.html">Gallery</a>
        <a href="inspirations.html">Inspirations</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <main class="inspirations-container">
    
    <header class="intro">
      <h1>Inspirations</h1>
      <p>My entire watchlist/readlist</p>
    </header>

    <aside class="filter-block">
      <form id="filter-form">
        <fieldset>
          <legend class="sr-only">Filter Watchlist and Readlist</legend>

          <div class="filter-group">
            <label for="search-input">Filter by Title:</label>
            <input type="text" id="search-input" placeholder="e.g. vagabond, vinland saga...">
          </div>

          <div class="filter-group">
            <label for="type-select">Format Type:</label>
            <select id="type-select">
              <option value="all">All Media</option>
              <option value="anime">Anime Only</option>
              <option value="movie">Movies Only</option>
              <option value="manga">Manga Only</option>
            </select>
          </div>

          <div class="filter-group checkbox-group">
            <input type="checkbox" id="show-highly-rated">
            <label for="show-highly-rated">Highest rated(9+/10)</label>
          </div>

          <button type="submit" class="filter-btn">Apply Filters</button>
        </fieldset>
      </form>
    </aside>

    <section class="inspiration-section favorites-section">
      <h2>Personal Favourites</h2>
      <p class="section-desc">Masterpieces that have deeply influenced my style and journey</p>
      
      <div id="favorites-grid" class="inspirations-grid">
        </div>
    </section>

    <hr class="section-divider">

    <section class="inspiration-section feed-section" aria-label="MyAnimeList Stream Feed">
      <div id="mal-feed-grid" class="inspirations-grid">
        </div>
    </section>

  </main>

  <footer>
    <p>Mike's art portfolio</p>
  </footer>

  <script type="module" src="js/inspirations.js"></script>
</body>
</html>
